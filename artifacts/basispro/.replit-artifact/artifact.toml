kind = "web"
previewPath = "/"
title = "BasisPro"
version = "1.0.0"
id = "artifacts/basispro"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25641

[services.development]
run = "pnpm --filter @workspace/basispro run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/basispro", "run", "build" ]
publicDir = "artifacts/basispro/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25641"
BASE_PATH = "/"
